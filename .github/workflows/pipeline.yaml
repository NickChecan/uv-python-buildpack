name: Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run unit tests
        run: make unit-test

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run smoke tests
        run: make smoke-test

  package-buildpack:
    name: Package Buildpack
    runs-on: ubuntu-latest
    needs:
      - unit-test
      - smoke-test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install buildpack-packager
        run: go install github.com/cloudfoundry/libbuildpack/packager/buildpack-packager@latest

      - name: Package buildpack
        run: buildpack-packager build -cached -any-stack

      - name: Upload packaged buildpack
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: packaged-buildpack
          path: "*.zip"
          if-no-files-found: error

  release-buildpack:
    name: Release Buildpack
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - package-buildpack
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download packaged buildpack
        uses: actions/download-artifact@v4
        with:
          name: packaged-buildpack

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install semantic-release
        run: npm install --no-save semantic-release @semantic-release/commit-analyzer @semantic-release/release-notes-generator @semantic-release/github conventional-changelog-conventionalcommits

      - name: Publish semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
